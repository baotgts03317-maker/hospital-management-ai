<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Admin Dashboard')}"></head>
<style>
    body {
        background: #0f172a;
        color: #e5e7eb;
        font-family: 'Inter', sans-serif;
    }

    .ai-main {
        background: linear-gradient(135deg, #0f172a, #111827);
        min-height: 100vh;
    }

    .ai-title {
        color: #f8fafc;
        font-weight: 800;
    }

    .ai-card {
        background: rgba(17, 24, 39, 0.92);
        border: 1px solid rgba(59, 130, 246, 0.25);
        border-radius: 22px;
        box-shadow: 0 0 25px rgba(59, 130, 246, 0.12);
        color: #fff;
        transition: 0.25s;
    }

    .ai-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 35px rgba(59, 130, 246, 0.28);
    }

    .ai-stat-title {
        color: #cbd5e1;
        font-size: 15px;
    }

    .ai-stat-number {
        font-size: 34px;
        font-weight: 800;
    }

    .ai-gradient-blue {
        background: linear-gradient(135deg, #2563eb, #06b6d4);
    }

    .ai-gradient-green {
        background: linear-gradient(135deg, #16a34a, #22c55e);
    }

    .ai-gradient-yellow {
        background: linear-gradient(135deg, #f59e0b, #facc15);
        color: #111827;
    }

    .ai-gradient-red {
        background: linear-gradient(135deg, #dc2626, #f43f5e);
    }

    .ai-gradient-purple {
        background: linear-gradient(135deg, #7c3aed, #3b82f6);
    }

    .ai-insight {
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.25), rgba(124, 58, 237, 0.25));
        border: 1px solid rgba(147, 197, 253, 0.3);
        border-radius: 22px;
        color: #e0f2fe;
    }

    .chart-card {
        background: #111827;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 22px;
        color: #e5e7eb;
    }

    .btn-ai {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        border: none;
        color: white;
        border-radius: 14px;
        padding: 10px 18px;
        font-weight: 600;
    }

    .btn-ai:hover {
        color: white;
        opacity: 0.9;
    }
</style>
<body>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2 p-0">

            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

        </div>

        <div class="col-md-10 p-4 ai-main">

            <h2 class="mb-4 ai-title">
    			AI Healthcare Dashboard
			</h2>
			<div class="mb-4">

    			<a th:href="@{/profile}" class="btn btn-ai mb-4">
    				<i class="bi bi-person-circle"></i>
    				Profile
				</a>

			</div>
            <div class="row">

                <div class="col-md-3 mb-4">

                    <div class="card ai-card ai-gradient-blue">
    					<div class="card-body">
        					<div class="ai-stat-title">Total Users</div>
        					<div class="ai-stat-number" th:text="${totalUsers}">0</div>
    					</div>
					</div>

                </div>

                <div class="col-md-3 mb-4">

                    <div class="card ai-card ai-gradient-green">
    					<div class="card-body">
        					<div class="ai-stat-title">Total Doctors</div>
        					<div class="ai-stat-number" th:text="${totalDoctors}">0</div>
    					</div>
					</div>

                </div>

                <div class="col-md-3 mb-4">

                    <div class="card ai-card ai-gradient-yellow">
    					<div class="card-body">
        					<div class="ai-stat-title">Total Patients</div>
        					<div class="ai-stat-number" th:text="${totalPatients}">0</div>
    					</div>
					</div>

                </div>

                <div class="col-md-3 mb-4">

                    <div class="card ai-card ai-gradient-red">
    					<div class="card-body">
        					<div class="ai-stat-title">Total Appointments</div>
        					<div class="ai-stat-number" th:text="${totalAppointments}">0</div>
    					</div>
					</div>

                </div>

            </div>
            
            <div class="col-md-3 mb-4">
    			<div class="card ai-card ai-gradient-purple">
        			<div class="card-body">
            			<div class="ai-stat-title">AI Consultations</div>
            			<div class="ai-stat-number" th:text="${totalAiConsultations}">0</div>
        			</div>
    			</div>
			</div>

            <div class="card chart-card p-4">
				 <h4 class="mb-3">
        			🤖 AI Insight
    			</h4>

    			<p class="mb-0 fs-5"
       				th:text="${aiInsight}">
        			AI đang phân tích dữ liệu hệ thống.
    			</p>

                <canvas id="dashboardChart"
                        height="100"></canvas>
				<hr class="my-5">

					<h4 class="mb-4">
    					AI Risk Analytics
					</h4>

				<canvas id="riskChart"
        				height="100"></canvas>
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

    const ctx =
        document.getElementById('dashboardChart');

    new Chart(ctx, {

        type: 'bar',

        data: {

            labels: [
                'Users',
                'Doctors',
                'Patients',
                'Appointments',
                'AI Consultations'
            ],

            datasets: [{
                label: 'Hospital Data',
                data: [
                    [[${totalUsers}]],
                    [[${totalDoctors}]],
                    [[${totalPatients}]],
                    [[${totalAppointments}]],
                    [[${totalAiConsultations}]]
                ],
                backgroundColor: [
                    '#3b82f6',
                    '#22c55e',
                    '#facc15',
                    '#ef4444',
                    '#8b5cf6'
                ],
                borderRadius: 12
            }]
        }

    });

    const riskCtx =
        document.getElementById('riskChart');

    new Chart(riskCtx, {

        type: 'pie',

        data: {

            labels: [
                'LOW',
                'MEDIUM',
                'HIGH'
            ],

            datasets: [{
                data: [
                    [[${lowRisk}]],
                    [[${mediumRisk}]],
                    [[${highRisk}]]
                ],
                backgroundColor: [
                    '#22c55e',
                    '#facc15',
                    '#ef4444'
                ]
            }]
        }

    });

</script>
</body>

</html>
