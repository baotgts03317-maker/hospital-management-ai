<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI Tóm tắt bệnh án</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="mb-4">
        <a th:href="@{/doctor/medical-records}" class="btn btn-secondary">
            Quay lại
        </a>
    </div>

    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">

            <h2 class="fw-bold text-primary mb-3">
                AI Tóm tắt bệnh án
            </h2>

            <div th:if="${summary == null}" class="alert alert-warning">
                Bệnh án này chưa được AI tóm tắt.
            </div>

            <div th:if="${summary != null}">

                <div class="alert alert-info">
                    <strong>Tóm tắt tổng quan:</strong>
                    <p class="mb-0 mt-2" th:text="${summary.summary}"></p>
                </div>

                <div class="row g-4 mt-2">

                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm rounded-4 h-100">
                            <div class="card-body">
                                <h5 class="fw-bold text-success">Triệu chứng chính</h5>
                                <p th:text="${summary.keySymptoms}"></p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm rounded-4 h-100">
                            <div class="card-body">
                                <h5 class="fw-bold text-danger">Chẩn đoán</h5>
                                <p th:text="${summary.diagnosisSummary}"></p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm rounded-4 h-100">
                            <div class="card-body">
                                <h5 class="fw-bold text-primary">Hướng điều trị</h5>
                                <p th:text="${summary.treatmentSummary}"></p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm rounded-4 h-100">
                            <div class="card-body">
                                <h5 class="fw-bold text-warning">Ghi chú tái khám</h5>
                                <p th:text="${summary.followUpNote}"></p>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="card border-0 shadow-sm rounded-4 mt-4">
                    <div class="card-body">
                        <h5 class="fw-bold">Nội dung bệnh án gốc</h5>
                        <pre class="bg-light p-3 rounded" th:text="${summary.originalContent}"></pre>
                    </div>
                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
